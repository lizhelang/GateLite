name: release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run verify:release

      - name: Build Docker image
        run: docker build -t "gatelite:${GITHUB_REF_NAME#v}" -t gatelite:latest .

      - name: Export Docker image
        run: docker save "gatelite:${GITHUB_REF_NAME#v}" | gzip > "gatelite-${GITHUB_REF_NAME#v}.tar.gz"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: "gatelite-${{ github.ref_name }}"
          path: "gatelite-*.tar.gz"
