name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gatelite

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run verify:release

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            --build-arg "GATELITE_VERSION=${VERSION}" \
            -t "gatelite:${VERSION}" \
            -t "${IMAGE_NAME}:${VERSION}" \
            -t "${IMAGE_NAME}:latest" \
            .

      - name: Push GHCR image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker push "${IMAGE_NAME}:${VERSION}"
          docker push "${IMAGE_NAME}:latest"

      - name: Export Docker image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker save "gatelite:${VERSION}" "${IMAGE_NAME}:${VERSION}" | gzip > "gatelite-${VERSION}.tar.gz"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: "gatelite-${{ github.ref_name }}"
          path: "gatelite-*.tar.gz"
